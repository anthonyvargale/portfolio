<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anthony Le | Resume</title>
    <style>
        /* This layout forces the buttons to the bottom */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Prevents double scrolling */
            display: flex;
            flex-direction: column;
            background-color: #333;
            font-family: Arial, sans-serif;
        }

        .pdf-wrapper {
            flex: 1; /* This takes up all available space EXCEPT the button area */
            width: 100%;
            -webkit-overflow-scrolling: touch; /* Smooth scrolling for iOS */
        }

        embed, iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .button-bar {
            height: 70px; /* Fixed height for buttons */
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            border-top: 1px solid #444;
        }

        .btn-view {
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
            color: white;
            transition: 0.2s;
        }

        .btn-back { background-color: #555; }
        .btn-download { background-color: #004c9b; }

        /* Mobile specific message */
        @media (max-width: 600px) {
            .mobile-hint {
                position: absolute;
                top: 10px;
                width: 100%;
                text-align: center;
                color: rgba(255,255,255,0.6);
                font-size: 12px;
                pointer-events: none;
            }
        }
    </style>
</head>
<body>

    <div class="mobile-hint">Tap PDF to scroll</div>

    <div class="pdf-wrapper">
        <iframe src="assets/Anthony Le (2026.) Resume (2).pdf"></iframe>
    </div>

    <div class="button-bar">
        <a href="index.html" class="btn-view btn-back">Back to Site</a>
        <a href="assets/Anthony Le (2026.) Resume (2).pdf" class="btn-view btn-download" download>Download PDF</a>
    </div>

</body>
</html>
