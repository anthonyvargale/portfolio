<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anthony Le | Resume Viewer</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; padding: 0; background-color: #333; font-family: sans-serif; }
        .resume-viewer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
        }
        embed {
            width: 90%;
            height: 85%;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .viewer-controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }
        .btn-view {
            padding: 10px 25px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-back { background: #666; color: white; }
        .btn-dl { background: #004c9b; color: white; }
        
        /* Mobile adjustment */
        @media (max-width: 600px) {
            embed { display: none; } /* PDFs often don't load in mobile browsers */
            .mobile-message { color: white; text-align: center; padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="resume-viewer-container">
        <embed src="assets/Anthony Le (2026.) Resume (2).pdf" type="application/pdf" />

        <div class="mobile-message" style="display: none;">
            <p>PDF preview is not supported on some mobile browsers.</p>
        </div>

        <div class="viewer-controls">
            <a href="index.html" class="btn-view btn-back">Back to Site</a>
            <a href="assets/Anthony_Le_Resume.pdf" class="btn-view btn-dl" download>Download PDF</a>
        </div>
    </div>

    <script>
        // Simple check to show mobile message if embed is hidden
        if (window.innerWidth < 600) {
            document.querySelector('.mobile-message').style.display = 'block';
        }
    </script>
</body>
</html>
